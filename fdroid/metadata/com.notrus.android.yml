AutoName: Notrus
Summary: Self-hostable encrypted messenger client
Description: |-
  Notrus is a self-hostable encrypted messenger client for Android.
  It is designed to talk to a Notrus relay that stores ciphertext,
  attachment blobs, transparency data, device records, and abuse-control
  state.

  Message plaintext, attachment plaintext, private identity keys, local
  ratchet state, and recovery secrets are intended to stay on user devices.
  The relay still sees account identifiers, public keys, linked-device
  metadata, opaque routing handles, delivery capabilities, timestamps,
  traffic patterns, and conversation membership needed for routing.

  Direct chats use a standards Signal path. Group chats use MLS-compatible
  group delivery where supported by the current client state. Android local
  secrets use Android Keystore or StrongBox-aware storage where available.

  Notrus is beta software. It is not externally audited, does not provide
  anonymity, and should not be described as proven secure. Users should read
  the threat model, security documentation, and beta limitations before
  relying on it.

  The Android app does not include Firebase, Google Play Services, ads,
  closed-source analytics SDKs, or crash-reporting SDKs in the current build
  configuration. Relay attestation enforcement is operator-configured and is
  documented separately.
