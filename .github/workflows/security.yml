name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  macos-security:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Secret scan
        run: node scripts/scan-secrets.mjs

      - name: Protocol core tests
        run: cargo test --manifest-path native/protocol-core/Cargo.toml

      - name: Mac checkpoint tests
        run: zsh scripts/test-mac-app.sh

      - name: Package app
        run: zsh scripts/package-mac-app.sh

      - name: Generate SBOM
        run: node scripts/generate-sbom.mjs

      - name: Start relay
        run: |
          PORT=3010 node server.js > /tmp/notrus-relay.log 2>&1 &
          echo $! > /tmp/notrus-relay.pid
          sleep 2

      - name: Runtime security proofs
        env:
          NOTRUS_METADATA_RELAY_ORIGIN: http://127.0.0.1:3010
          NOTRUS_CONTENT_RELAY_ORIGIN: http://127.0.0.1:3010
          NOTRUS_ADVERSARIAL_RELAY_ORIGIN: http://127.0.0.1:3010
          NOTRUS_PRIVACY_RELAY_ORIGIN: http://127.0.0.1:3010
        run: |
          npm run test:attestation-service
          npm run test:attestation-enforcement
          npm run test:client-surfaces
          npm run test:privacy-routing
          npm run test:retention-pruning
          npm run test:metadata-boundary
          npm run test:content-boundary
          npm run test:production-api-boundary
          npm run test:recovery-lifecycle
          npm run test:adversarial-inputs
          npm run test:abuse-controls
          npm run test:device-membership

      - name: Stop relay
        if: always()
        run: |
          if [ -f /tmp/notrus-relay.pid ]; then
            kill "$(cat /tmp/notrus-relay.pid)" || true
          fi

  android-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Build Android client
        run: zsh scripts/build-android-app.sh

      - name: Android unit tests
        run: |
          cd native/android/NotrusAndroid
          ./gradlew testDebugUnitTest

      - name: Package Android client
        run: zsh scripts/package-android-app.sh
